<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verifikasi Terakhir - Klaim Hadiah</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding-top: 30px; }
    .container { max-width: 500px; text-align: center; }
    .card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 30px; }
    .progress { height: 25px; border-radius: 15px; margin: 20px 0; }
    .btn-wa { background-color: #25d366; color: white; font-weight: bold; padding: 15px; border-radius: 30px; border: none; width: 100%; font-size: 1.1rem; }
    .btn-wa:hover { background-color: #128c7e; color: white; }
    .reward-summary { background: #fff3cd; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h3 class="fw-bold text-primary">Hampir Selesai!</h3>
      <p>Verifikasi akun berhasil. Untuk mencegah SPAM, silakan bagikan ke WhatsApp sampai bar di bawah penuh.</p>

      <div class="reward-summary">
        <strong>Hadiah Sedang Diproses:</strong><br>
        <span id="display-reward">-</span> (<span id="display-game">-</span>)
      </div>

      <div class="progress">
        <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%;">0%</div>
      </div>

      <p class="small text-secondary mb-4">Bagikan ke 5 grup atau 10 teman WhatsApp agar hadiah langsung terkirim.</p>

      <button id="shareBtn" class="btn btn-wa">
        <i class="bi bi-whatsapp me-2"></i> BAGIKAN KE WHATSAPP
      </button>

      <p class="mt-4 small text-danger fw-bold">* Jangan tutup halaman ini sampai hadiah masuk!</p>
    </div>
  </div>

  <script>
    const reward = localStorage.getItem('selected_reward') || '-';
    const game = localStorage.getItem('selected_game') || '-';
    document.getElementById('display-reward').innerText = reward;
    document.getElementById('display-game').innerText = game;

    let progress = 0;
    const progressBar = document.getElementById('progress-bar');
    const shareBtn = document.getElementById('shareBtn');

    shareBtn.addEventListener('click', () => {
      // Universal WhatsApp Link (works better on Desktop/Mobile)
      const text = `Woi, gue baru aja dapet ${reward} gratis di web ini! Beneran masuk, buruan klaim sebelum habis: https://topup-game-free.github.io`;
      const waUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`;
      window.open(waUrl, '_blank');

      // Increase progress
      progress += 20;
      if (progress > 100) progress = 100;
      
      progressBar.style.width = progress + '%';
      progressBar.innerText = progress + '%';

      if (progress >= 100) {
        shareBtn.disabled = true;
        shareBtn.innerText = 'MEMPROSES HADIAH...';
        setTimeout(() => {
          window.location.href = 'alert.html';
        }, 3000);
      }
    });
  </script>
</body>
</html>
