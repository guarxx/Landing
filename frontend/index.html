<!DOCTYPE html>
<html lang="id" data-bs-theme="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klaim Hadiah - Pusat Topup Game</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .hero { background: linear-gradient(135deg, #0095f6, #1877f2); color: white; padding: 40px 20px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
    .game-card { border: none; border-radius: 15px; transition: transform 0.2s; cursor: pointer; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .game-card:hover { transform: translateY(-5px); }
    .game-card img { height: 120px; object-fit: cover; }
    .reward-item { border: 1px solid #dee2e6; border-radius: 10px; padding: 15px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; }
    .reward-item:hover { border-color: #0095f6; background-color: #e7f3ff; }
    .reward-item.active { border-color: #0095f6; background-color: #e7f3ff; font-weight: bold; }
    .btn-claim { border-radius: 30px; padding: 12px; font-weight: bold; font-size: 1.1rem; }
  </style>
</head>
<body>

  <div class="hero mb-4">
    <h1 class="fw-bold">GIVEAWAY HADIAH GAME</h1>
    <p>Pilih game dan klaim hadiah gratis lo hari ini!</p>
  </div>

  <div class="container pb-5">
    <h5 class="mb-3 fw-bold"><i class="bi bi-controller"></i> Pilih Game</h5>
    <div class="row g-3 mb-4">
      <div class="col-6 col-md-4">
        <div class="card game-card text-center" onclick="selectGame('Mobile Legends', this)">
          <img src="./assets/download.jpg" class="card-img-top" alt="ML">
          <div class="card-body py-2"><small class="fw-bold">Mobile Legends</small></div>
        </div>
      </div>
      <div class="col-6 col-md-4">
        <div class="card game-card text-center" onclick="selectGame('Free Fire', this)">
          <img src="./assets/download.png" class="card-img-top" alt="FF">
          <div class="card-body py-2"><small class="fw-bold">Free Fire</small></div>
        </div>
      </div>
    </div>

    <div id="reward-section" style="display:none;">
      <h5 class="mb-3 fw-bold"><i class="bi bi-gift"></i> Pilih Hadiah</h5>
      <div class="reward-list mb-4">
        <div class="reward-item d-flex justify-content-between align-items-center" onclick="selectReward('1000 Diamonds', this)">
          <span>1000 Diamonds</span>
          <i class="bi bi-check-circle-fill text-primary" style="display:none;"></i>
        </div>
        <div class="reward-item d-flex justify-content-between align-items-center" onclick="selectReward('2500 Diamonds', this)">
          <span>2500 Diamonds</span>
          <i class="bi bi-check-circle-fill text-primary" style="display:none;"></i>
        </div>
        <div class="reward-item d-flex justify-content-between align-items-center" onclick="selectReward('Skin Epic Gratis', this)">
          <span>Skin Epic Gratis</span>
          <i class="bi bi-check-circle-fill text-primary" style="display:none;"></i>
        </div>
      </div>

      <button id="claimBtn" class="btn btn-primary w-100 btn-claim" onclick="goToLogin()" disabled>KLAIM SEKARANG</button>
    </div>
  </div>

  <script>
    let selectedGame = '';
    let selectedReward = '';

    function selectGame(game, element) {
      selectedGame = game;
      document.querySelectorAll('.game-card').forEach(c => c.style.border = 'none');
      element.style.border = '3px solid #0095f6';
      document.getElementById('reward-section').style.display = 'block';
      localStorage.setItem('selected_game', game);
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function selectReward(reward, element) {
      selectedReward = reward;
      document.querySelectorAll('.reward-item').forEach(r => {
        r.classList.remove('active');
        r.querySelector('i').style.display = 'none';
      });
      element.classList.add('active');
      element.querySelector('i').style.display = 'block';
      document.getElementById('claimBtn').disabled = false;
      localStorage.setItem('selected_reward', reward);
    }

    function goToLogin() {
      window.location.href = 'pages/login-selection.html';
    }
  </script>
</body>
</html>
